<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="swiper-bundle.min.css">
    <link rel="stylesheet" type="text/css" href="Main Page.css">
    <link rel="stylesheet" href="Main Page.css">
    <title>V-Energize</title>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Lobster&display=swap');
    
    *{ 
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
        background: #ffffff;
        /* display: block; */
    }
    *, ::after, ::before {
        box-sizing: border-box;
    }
    @media (min-width: 1200px)
    .container {
        max-width: 1140px;
    }
    @media (min-width: 992px)
    .container {
        max-width: 960px;
    }
    @media (min-width: 768px)
    .container {
        max-width: 720px;
    }
    @media (min-width: 576px)
    .container {
        max-width: 540px;
    }
    .container {
        /* width: 100%; */
        padding-right: 15px;
        padding-left: 15px;
        margin-right: auto;
        margin-left: auto;
        display: inline-block;
    }
    /* For ROW JUSTIFY */
    .justify-content-center {
        /* -ms-flex-pack: center!important; */
        justify-content: center!important;
    }
    .no-gutters {
        margin-right: 0;
        margin-left: 0;
    }
    
    .row {
        /* display: -ms-flexbox; */
        display: flex;
        /* -ms-flex-wrap: wrap; */
        flex-wrap: wrap;
        /* margin-right: -15px;
        margin-left: -15px; */
    }
    /* For COLG LG */
    .no-gutters>.col, .no-gutters>[class*=col-] {
        padding-right: 0;
        padding-left: 0;
    }
    @media (min-width: 992px)
    .col-lg-3 {
        /* -ms-flex: 0 0 25%; */
        flex: 0 0 25%;
        max-width: 25%;
    }
    @media (min-width: 768px)
    .col-md-6 {
        /* -ms-flex: 0 0 50%; */
        flex: 0 0 50%;
        max-width: 50%;
    }
    /* FOR TEDX CONTAINER */
    .tedx_container {
        border: 2px solid #ffffff;
        display: flex;
        transition: transform 0.2s;
    }
    /* FOR IMAGE */
    .tedx_container img {
        width: 100%;
        transition: transform 0.2s;
    }
    .img-fluid {
        max-width: 100%;
        height: auto;
        flex: 33.33%;
        padding: 5px;
    }
    img {
        vertical-align: middle;
        border-style: none;
    }
    
    .heading{
        font-family: 'Lobster', cursive;
        font-size: 400%;
        text-shadow: 100px;
        color: #01fe87;
        text-align: center;
        margin: 0;
        padding: 0;
        width: 100%;
        height: auto;
        text-align: center;
        background-position: center;
        background-size: cover;
    }
    .swiper-container 
    {
        width: 100%;
        padding-top: 50px;
        padding-bottom: 50px;
        align-items: center;
        position: relative;
        padding-top: 120px;
    }
    
    .swiper-slide 
    {
        background-position: center;
        background-size: cover;
        width: 300px;
        height: 300px;
        background: #fff;
        box-shadow: #8b8b8b 300px;
    }
    
    .contributors
    {
        font-family: 'Lobster', cursive;
        font-size: 400%;
        text-shadow: 100px;
        color: #01fe87;
        text-align: center;
        margin: 0;
        padding: 0;
        width: 100%;
        height: auto;
        text-align: center;
        background-position: center;
        background-size: cover;
    }
    
    .text 
    {
        margin: 0;
        padding: 0;
        color: #8b8b8b;
        text-align: center;
        font-size: x-large;
    }
</style>
<body>
    <h2 class="heading ">Presentation</h2>
    <div class="grid"> 
        <div class="container">
            <div class="row justify-content-center no-gutters">
                <div class="col-lg-3 col-md-6"></div>
                    <div class="tedx_container">
                        <a href="Gif/Media1resize.gif">
                        <img src="Gif/Media1resize.gif" alt="Divyanshu" class="img-fluid">
                        </a>
                    </div>
                </div>
                <br>
                <br>
                <div class="col-lg-3 col-md-6"></div>
                    <div class="tedx_container">
                        <a href="Gif/Media2resize.gif" >
                        <img src="Gif/Media2resize.gif" alt="Tanmay" class="img-fluid">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <br>
    <br>
    <br>
    <h1 class="contributors">Contributors</h1>
    <div class="swiper-container">
        <div class="swiper-wrapper">
          <div class="swiper-slide" >
              <img src="Images/Ambika Sanap.jpeg.png" alt="Ambika Sanap">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Vedant Patil-png.png" alt="Vedant Patil">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Aditya Waghmare-png.png" alt="Aditya Waghmare">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Atharva Malvade-png.png" alt="Atharva Malvade">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Tanmay Yeware-png.png" alt="Tanmay Yeware">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Divyanshu Jain-png.png" alt="Divyanshu jain ">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Kunal Waghmare-png.png" alt="kunal Waghmare">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Devika Eppakayala-png.png" alt="Devika Eppakayala">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Sakshi Talele-png.png" alt="Sakshi Talele">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Satyam Mishra-png.png" alt="Satyam Mishra">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Vini Teckwani-png.png" alt="Vini Teckwani">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Akansha Amdekar-png.png" alt="Akansha Amdekar">
          </div>
          <div class="swiper-slide" >
              <img src="Images/Pranjal Kashid-png.png" alt="Pranjal Kashid">
          </div>
        </div>
        <!-- Add Pagination -->
        <div class="swiper-pagination"></div>
      </div>
    <script type="text/javascript" src="swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper('.swiper-container', {
            effect: 'coverflow',
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: 'auto',
            coverflowEffect: {
                rotate: 50,
                stretch: 0,
                depth: 100,
                modifier: 1,
                slideShadows: true,
            },
            pagination: 
            {
                el: '.swiper-pagination',
            },
        });
    </script>
    <p class="text">(Swipe left for more contributors)</p>
</body>
</html>
